provider: deepseek
base_url: "https://api.deepseek.com"
api_key_env: "DEEPSEEK_API_KEY"

models:
  solver_primary: "deepseek-reasoner"
  perturbation_generator: "deepseek-chat"
  optional_secondary: ""

request_defaults:
  temperature: 0.1
  top_p: 1.0
  max_tokens: 2048
  timeout_seconds: 120

perturbation_defaults:
  temperature: 0.7
  top_p: 1.0
  max_tokens: 1024
  timeout_seconds: 120
