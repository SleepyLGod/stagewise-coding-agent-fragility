provider: openai_compatible
base_url: https://api.deepseek.com/v1
api_key_env: DEEPSEEK_API_KEY
models:
  solver_primary: deepseek-chat
  perturbation_generator: deepseek-chat
  optional_secondary: ''
request_defaults:
  temperature: 0.3
  top_p: 0.8
  max_tokens: 1536
  timeout_seconds: 60
perturbation_defaults:
  temperature: 0.3
  top_p: 0.8
  max_tokens: 1024
  timeout_seconds: 60
